apiVersion: 1
providers:
  - name: TinyLlama
    orgId: 1
    folder: TinyLlama
    type: file
    disableDeletion: false
    editable: true
    # Reload JSON from disk periodically (dashboard Refresh only re-queries Prometheus).
    updateIntervalSeconds: 5
    options:
      path: /var/lib/grafana/dashboards
